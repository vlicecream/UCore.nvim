[ue5]
ignored_unknown_names = [
  "TArray", "TMap", "TSet", "TQueue", "TWeakObjectPtr", "TSubclassOf",
  "TSharedPtr", "TSharedRef", "TWeakPtr", "TUniquePtr", "TObjectPtr",
  "FString", "FName", "FText", "FVector", "FRotator", "FQuat",
  "FTransform", "FColor", "FLinearColor", "FBox", "FBoxSphereBounds",
  "UPROPERTY", "UFUNCTION", "UCLASS", "USTRUCT", "UENUM", "UINTERFACE",
  "UMETA", "UPARAM", "GENERATED_BODY", "GENERATED_UCLASS_BODY",
  "TEXT", "LOCTEXT", "NSLOCTEXT", "INVTEXT",
]

[ue5.suppress_member]
classes = [
  "TArray", "TMap", "TSet", "TQueue", "TSubclassOf", "TWeakObjectPtr",
  "TSharedPtr", "TSharedRef", "TWeakPtr", "TUniquePtr", "TObjectPtr",
  "FString", "FName",
]
